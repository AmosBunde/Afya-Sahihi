# Active-learning acquisition scheduler. Paper 3 (M9 #37). Picks 20
# cases/week for Tier 3 clinician review (ADR-0006); writes queue
# entries to Redis that the labeling UI reads. Runs every 6h.

apiVersion: v1
kind: ConfigMap
metadata:
  name: al-scheduler-config
  namespace: afya-sahihi
  labels:
    app.kubernetes.io/name: al-scheduler
    app.kubernetes.io/part-of: afya-sahihi
data:
  SERVICE_NAME: afya-sahihi-al-scheduler
  SERVICE_PORT: "8087"
  SERVICE_LOG_LEVEL: info
  SERVICE_LOG_FORMAT: json
  OTEL_SERVICE_NAME: afya-sahihi-al-scheduler
  OTEL_SERVICE_NAMESPACE: afya-sahihi
  OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector.observability.svc.cluster.local:4317
  OTEL_EXPORTER_OTLP_PROTOCOL: grpc
  OTEL_TRACES_SAMPLER_RATIO: "1.0"
  DEPLOYMENT_ENV: dev
  AL_ACQUISITION_FUNCTION: entropy_with_conformal_weight
  AL_WEEKLY_BUDGET_PER_REVIEWER: "20"
  AL_DUAL_RATER_RATIO: "0.2"
  AL_REDIS_QUEUE_KEY: afya-sahihi:labeling:queue
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: al-scheduler
  namespace: afya-sahihi
  labels:
    app.kubernetes.io/name: al-scheduler
    app.kubernetes.io/part-of: afya-sahihi
    app.kubernetes.io/component: research
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: al-scheduler
  template:
    metadata:
      labels:
        app.kubernetes.io/name: al-scheduler
        app.kubernetes.io/part-of: afya-sahihi
        app.kubernetes.io/component: research
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9090"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: al-scheduler
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: al-scheduler
          image: harbor.aku.edu/afya-sahihi/al-scheduler:1.0.0
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8087
            - name: metrics
              containerPort: 9090
          envFrom:
            - configMapRef:
                name: al-scheduler-config
            - secretRef:
                name: al-scheduler-secrets
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "1"
              memory: "1Gi"
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          livenessProbe:
            httpGet: { path: /healthz, port: http }
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet: { path: /readyz, port: http }
            initialDelaySeconds: 5
            periodSeconds: 10
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: { sizeLimit: 256Mi }
      terminationGracePeriodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: al-scheduler
  namespace: afya-sahihi
  labels:
    app.kubernetes.io/name: al-scheduler
    app.kubernetes.io/part-of: afya-sahihi
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: al-scheduler
  ports:
    - name: http
      port: 8087
      targetPort: http
    - name: metrics
      port: 9090
      targetPort: metrics
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: al-scheduler
  namespace: afya-sahihi
automountServiceAccountToken: false
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: al-scheduler
  namespace: afya-sahihi
spec:
  maxUnavailable: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: al-scheduler
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: al-scheduler
  namespace: afya-sahihi
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: al-scheduler
  minReplicas: 1
  maxReplicas: 2
  metrics:
    - type: Resource
      resource:
        name: cpu
        target: { type: Utilization, averageUtilization: 75 }
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: al-scheduler
  namespace: afya-sahihi
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: al-scheduler
  policyTypes: [Ingress, Egress]
  ingress:
    # Internal only (Grafana for status, observability ns scrapes metrics).
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: observability
      ports:
        - port: 8087
          protocol: TCP
        - port: 9090
          protocol: TCP
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
      ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
    # Postgres for query audit + grades history + Redis for queue push.
    - to:
        - ipBlock: { cidr: 10.0.0.10/32 }
      ports:
        - port: 5432
          protocol: TCP
        - port: 6379
          protocol: TCP
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: observability
          podSelector:
            matchLabels:
              app.kubernetes.io/name: otel-collector
      ports:
        - port: 4317
          protocol: TCP
---
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: al-scheduler
  namespace: afya-sahihi
  labels:
    app.kubernetes.io/name: al-scheduler
    app.kubernetes.io/part-of: afya-sahihi
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: al-scheduler
  endpoints:
    - port: metrics
      interval: 15s
      path: /metrics
