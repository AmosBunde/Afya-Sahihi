# Eval runner — long-running status + API surface for the three-tier
# Inspect AI eval harness (ADR-0006). The Tier 1 runs per commit in
# CI; the Tier 2 nightly runs as a CronJob (50-jobs/tier2-eval-cronjob.yaml).
# This Deployment is the HTTP API that serves eval-run status and
# history for Grafana's eval dashboard.

apiVersion: v1
kind: ConfigMap
metadata:
  name: eval-runner-config
  namespace: afya-sahihi
  labels:
    app.kubernetes.io/name: eval-runner
    app.kubernetes.io/part-of: afya-sahihi
data:
  SERVICE_NAME: afya-sahihi-eval-runner
  SERVICE_PORT: "8086"
  SERVICE_LOG_LEVEL: info
  SERVICE_LOG_FORMAT: json
  OTEL_SERVICE_NAME: afya-sahihi-eval-runner
  OTEL_SERVICE_NAMESPACE: afya-sahihi
  OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector.observability.svc.cluster.local:4317
  OTEL_EXPORTER_OTLP_PROTOCOL: grpc
  OTEL_TRACES_SAMPLER_RATIO: "1.0"
  DEPLOYMENT_ENV: dev
  EVAL_TIER1_PASS_RATE_FLOOR: "0.95"
  EVAL_TIER2_ECE_MAX: "0.08"
  EVAL_TIER2_COVERAGE_DEVIATION_MAX: "0.03"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: eval-runner
  namespace: afya-sahihi
  labels:
    app.kubernetes.io/name: eval-runner
    app.kubernetes.io/part-of: afya-sahihi
    app.kubernetes.io/component: eval
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: eval-runner
  template:
    metadata:
      labels:
        app.kubernetes.io/name: eval-runner
        app.kubernetes.io/part-of: afya-sahihi
        app.kubernetes.io/component: eval
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9090"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: eval-runner
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: eval-runner
          image: harbor.aku.edu/afya-sahihi/eval-runner:1.0.0
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8086
            - name: metrics
              containerPort: 9090
          envFrom:
            - configMapRef:
                name: eval-runner-config
            - secretRef:
                name: eval-runner-secrets
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "1Gi"
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          livenessProbe:
            httpGet: { path: /healthz, port: http }
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            httpGet: { path: /readyz, port: http }
            initialDelaySeconds: 5
            periodSeconds: 5
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: { sizeLimit: 256Mi }
      terminationGracePeriodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: eval-runner
  namespace: afya-sahihi
  labels:
    app.kubernetes.io/name: eval-runner
    app.kubernetes.io/part-of: afya-sahihi
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: eval-runner
  ports:
    - name: http
      port: 8086
      targetPort: http
    - name: metrics
      port: 9090
      targetPort: metrics
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: eval-runner
  namespace: afya-sahihi
automountServiceAccountToken: false
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: eval-runner
  namespace: afya-sahihi
spec:
  # Single replica by design (eval state is in Postgres; the service
  # is a read surface). PDB still declared for consistency.
  maxUnavailable: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: eval-runner
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: eval-runner
  namespace: afya-sahihi
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: eval-runner
  minReplicas: 1
  maxReplicas: 2
  metrics:
    - type: Resource
      resource:
        name: cpu
        target: { type: Utilization, averageUtilization: 75 }
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: eval-runner
  namespace: afya-sahihi
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: eval-runner
  policyTypes: [Ingress, Egress]
  ingress:
    # Grafana scrapes eval-run status via its Prometheus datasource
    # (metrics path) and via a direct HTTP data source on 8086.
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: observability
      ports:
        - port: 8086
          protocol: TCP
        - port: 9090
          protocol: TCP
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
      ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
    - to:
        - ipBlock: { cidr: 10.0.0.10/32 }
      ports:
        - port: 5432
          protocol: TCP
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: observability
          podSelector:
            matchLabels:
              app.kubernetes.io/name: otel-collector
      ports:
        - port: 4317
          protocol: TCP
---
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: eval-runner
  namespace: afya-sahihi
  labels:
    app.kubernetes.io/name: eval-runner
    app.kubernetes.io/part-of: afya-sahihi
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: eval-runner
  endpoints:
    - port: metrics
      interval: 15s
      path: /metrics
