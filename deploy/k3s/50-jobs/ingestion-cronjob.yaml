# Ingestion CronJob.
#
# Runs `python -m ingestion` on the configured schedule to re-scan the
# corpus manifest and ingest any PDFs whose document_hash has changed.
# The pipeline is idempotent (see backend/ingestion/repository.py), so
# overlapping runs only duplicate work, they do not corrupt data.
#
# Dependencies landing later:
#   - The container image (ghcr.io/akuhealth/afya-sahihi-ingestion) is
#     produced by the container-build CI job once the Dockerfile lands
#     with issue #14.
#   - Secret afya-sahihi-pg-ingestion provides PG_PASSWORD; it is a
#     SealedSecret per deploy/k3s/40-sealed-secrets/.
#   - ConfigMap afya-sahihi-ingestion-env mirrors env/ingestion.env and
#     is generated by Kustomize; lands with issue #34 (per-service
#     k3s manifests).

apiVersion: batch/v1
kind: CronJob
metadata:
  name: afya-sahihi-ingestion
  namespace: afya-sahihi
  labels:
    app.kubernetes.io/name: afya-sahihi-ingestion
    app.kubernetes.io/component: ingestion
    app.kubernetes.io/part-of: afya-sahihi
spec:
  # Monday 03:00 Africa/Nairobi, per env/ingestion.env INGESTION_SCHEDULE_CRON.
  schedule: "0 3 * * 1"
  timeZone: Africa/Nairobi
  concurrencyPolicy: Forbid
  startingDeadlineSeconds: 3600
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 5
  jobTemplate:
    spec:
      # Pipeline is idempotent; retry up to 3 times with exponential backoff.
      backoffLimit: 3
      activeDeadlineSeconds: 7200   # 2h cap per run
      ttlSecondsAfterFinished: 604800  # 7 days
      template:
        metadata:
          labels:
            app.kubernetes.io/name: afya-sahihi-ingestion
        spec:
          restartPolicy: OnFailure
          serviceAccountName: afya-sahihi-ingestion
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            runAsGroup: 1000
            fsGroup: 1000
            seccompProfile:
              type: RuntimeDefault
          containers:
            - name: ingestion
              image: ghcr.io/akuhealth/afya-sahihi-ingestion:latest
              imagePullPolicy: IfNotPresent
              command: ["python", "-m", "ingestion"]
              args:
                - "--manifest"
                - "/etc/afya-sahihi/manifest.yaml"
              envFrom:
                - configMapRef:
                    name: afya-sahihi-ingestion-env
              env:
                - name: PG_PASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: afya-sahihi-pg-ingestion
                      key: password
              resources:
                requests:
                  cpu: "2"
                  memory: 8Gi
                limits:
                  cpu: "4"
                  memory: 16Gi
              securityContext:
                allowPrivilegeEscalation: false
                readOnlyRootFilesystem: true
                capabilities:
                  drop: ["ALL"]
              volumeMounts:
                - name: manifest
                  mountPath: /etc/afya-sahihi
                  readOnly: true
                - name: tmp
                  mountPath: /tmp
                - name: hf-cache
                  mountPath: /home/ingest/.cache/huggingface
          volumes:
            - name: manifest
              configMap:
                name: afya-sahihi-ingestion-manifest
            - name: tmp
              emptyDir:
                sizeLimit: 4Gi
            - name: hf-cache
              persistentVolumeClaim:
                claimName: afya-sahihi-hf-cache
