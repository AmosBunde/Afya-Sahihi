# SealedSecrets controller.
#
# Bitnami's sealed-secrets decrypts SealedSecret CRs in-cluster using
# a key-pair held by the controller. The public half is distributed to
# operators; the private half never leaves the cluster. Rotation is
# quarterly via `kubeseal --recovery-unseal`.
#
# This manifest installs the CRD + controller. Bootstrap runs after
# k3s is up and before the watcher pulls any SealedSecret-bearing
# manifests — the watcher refuses to apply a manifest with unknown
# CRDs, so the order matters:
#   1. install_k3s_server.sh
#   2. kubectl apply -f deploy/k3s/sealed-secrets.yaml
#   3. kubeseal-seed the controller's key-pair (one-time; see runbook)
#   4. install_watcher.sh (starts the polling loop)

apiVersion: v1
kind: Namespace
metadata:
  name: kube-system
  labels:
    app.kubernetes.io/managed-by: afya-sahihi-watcher
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: sealed-secrets-controller
  namespace: kube-system
  labels:
    app.kubernetes.io/name: sealed-secrets
    app.kubernetes.io/part-of: afya-sahihi
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: sealed-secrets
  template:
    metadata:
      labels:
        app.kubernetes.io/name: sealed-secrets
    spec:
      serviceAccountName: sealed-secrets-controller
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        runAsGroup: 1001
        fsGroup: 1001
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: sealed-secrets-controller
          image: bitnami/sealed-secrets-controller:v0.27.2
          imagePullPolicy: IfNotPresent
          args:
            - --key-prefix=afya-sahihi
            - --log-level=info
          ports:
            - name: http
              containerPort: 8080
            - name: metrics
              containerPort: 8081
          resources:
            requests:
              cpu: "50m"
              memory: 128Mi
            limits:
              cpu: "500m"
              memory: 512Mi
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8081
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8081
            initialDelaySeconds: 30
            periodSeconds: 30
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir:
            sizeLimit: 100Mi
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: sealed-secrets-controller
  namespace: kube-system
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: sealed-secrets-controller
rules:
  - apiGroups: ["bitnami.com"]
    resources: ["sealedsecrets", "sealedsecrets/status"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: [""]
    resources: ["events"]
    verbs: ["create", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: sealed-secrets-controller
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: sealed-secrets-controller
subjects:
  - kind: ServiceAccount
    name: sealed-secrets-controller
    namespace: kube-system
---
apiVersion: v1
kind: Service
metadata:
  name: sealed-secrets-controller
  namespace: kube-system
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: sealed-secrets
  ports:
    - name: http
      port: 8080
      targetPort: http
