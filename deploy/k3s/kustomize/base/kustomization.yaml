# Base kustomization: everything every environment needs.
#
# Overlays in ../overlays/{dev,staging,production}/ apply per-env
# patches (replica counts, resource limits, ingress hostnames,
# sampler ratios).
#
# NOTE: the dashboard JSON ConfigMap (grafana-dashboards-json) is NOT
# included here; it's generated by
# scripts/observability/build_dashboards_configmap.sh and applied
# alongside this kustomization at deploy time. This keeps the manifest
# diff reviewable; the generator output is large but deterministic.

apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../00-namespace.yaml
  - ../../10-gateway.yaml
  - ../../20-redis.yaml
  - ../../30-labeling.yaml
  - ../../50-jobs/ingestion-cronjob.yaml
  - ../../50-jobs/tier2-eval-cronjob.yaml
  - ../../50-jobs/labeling-kappa-cronjob.yaml
  - ../../60-observability/00-namespace.yaml
  - ../../60-observability/10-otel-collector.yaml
  - ../../60-observability/20-tempo.yaml
  - ../../60-observability/30-phoenix.yaml
  - ../../60-observability/40-prometheus.yaml
  - ../../60-observability/45-alertmanager.yaml
  - ../../60-observability/50-loki.yaml
  - ../../60-observability/60-grafana.yaml
  - ../../60-observability/70-exporters.yaml
  - ../../traefik-ingress.yaml

# Label every object with managed-by so the watcher's prune targets
# only objects it owns. `includeSelectors: false` keeps the label off
# Deployment selectors — adding a selector label to existing Deployments
# would break the immutable-selector rule at apply time.
labels:
  - pairs:
      app.kubernetes.io/managed-by: afya-sahihi-watcher
    includeSelectors: false
    includeTemplates: true
