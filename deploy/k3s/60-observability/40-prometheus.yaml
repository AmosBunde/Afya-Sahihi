# Prometheus + Alertmanager.
#
# Single-replica Prometheus with 30-day retention backed by a 50Gi PVC.
# Scrapes:
#   - gateway, retrieval, conformal, audit via Service discovery
#     (prometheus.io/scrape=true annotation)
#   - OTel Collector on 8888 (Collector's own telemetry)
#   - node-exporter, postgres-exporter, redis-exporter (from 70-exporters.yaml)
#   - DCGM exporter on the GPU node (out-of-cluster, scraped by IP)
#
# Alertmanager routes:
#   - severity=page        → PagerDuty (via Slack webhook as fallback)
#   - severity=warning     → Slack #afya-sahihi-alerts
#   - everything else      → log-only (handled by notifier.null)
#
# Recording rules pre-compute the RED histogram quantiles so Grafana
# dashboards don't have to.

apiVersion: v1
kind: ServiceAccount
metadata:
  name: prometheus
  namespace: observability
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: prometheus
rules:
  - apiGroups: [""]
    resources: ["nodes", "nodes/metrics", "services", "endpoints", "pods"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["get"]
  - nonResourceURLs: ["/metrics"]
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: prometheus
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: prometheus
subjects:
  - kind: ServiceAccount
    name: prometheus
    namespace: observability
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: observability
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s
      evaluation_interval: 15s
      external_labels:
        cluster: afya-sahihi
        deployment_env: ${DEPLOYMENT_ENV}

    alerting:
      alertmanagers:
        - static_configs:
            - targets:
                - alertmanager.observability.svc.cluster.local:9093

    rule_files:
      - /etc/prometheus/rules/*.yaml

    scrape_configs:
      - job_name: 'prometheus'
        static_configs:
          - targets: ['localhost:9090']

      # Kubernetes pod discovery — picks up any pod with
      # prometheus.io/scrape=true annotation.
      - job_name: 'kubernetes-pods'
        kubernetes_sd_configs:
          - role: pod
        relabel_configs:
          - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_scrape]
            action: keep
            regex: 'true'
          - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_port]
            action: replace
            target_label: __address__
            regex: ([^:]+)(?::\d+)?;(\d+)
            replacement: $1:$2
          - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_path]
            action: replace
            target_label: __metrics_path__
            regex: (.+)
          - source_labels: [__meta_kubernetes_namespace]
            action: replace
            target_label: namespace
          - source_labels: [__meta_kubernetes_pod_name]
            action: replace
            target_label: pod
          - source_labels: [__meta_kubernetes_pod_label_app_kubernetes_io_name]
            action: replace
            target_label: service

      - job_name: 'otel-collector'
        kubernetes_sd_configs:
          - role: pod
            namespaces:
              names: [observability]
        relabel_configs:
          - source_labels: [__meta_kubernetes_pod_label_app_kubernetes_io_name]
            action: keep
            regex: otel-collector
          - source_labels: [__address__]
            action: replace
            target_label: __address__
            regex: ([^:]+)(?::\d+)?
            replacement: $1:8888

      # DCGM exporter on the out-of-cluster GPU node. Static target
      # because the GPU node is not in k3s (it runs vLLM on bare metal).
      - job_name: 'dcgm'
        static_configs:
          - targets: ['afya-sahihi-gpu-01.internal:9400']
            labels:
              service: vllm-gpu
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-rules
  namespace: observability
data:
  recording-rules.yaml: |
    groups:
      - name: afya-sahihi.red
        interval: 30s
        rules:
          # RED pre-aggregations per service.
          - record: afya_sahihi:request_rate:5m
            expr: |
              sum by (service) (
                rate(afya_sahihi_http_requests_total[5m])
              )
          - record: afya_sahihi:error_rate:5m
            expr: |
              sum by (service) (
                rate(afya_sahihi_http_requests_total{status=~"5.."}[5m])
              )
              /
              sum by (service) (
                rate(afya_sahihi_http_requests_total[5m])
              )
          - record: afya_sahihi:latency_p99:5m
            expr: |
              histogram_quantile(
                0.99,
                sum by (service, le) (
                  rate(afya_sahihi_http_request_duration_seconds_bucket[5m])
                )
              )
  alert-rules.yaml: |
    groups:
      - name: afya-sahihi.alerts
        rules:
          - alert: HighErrorRate
            expr: afya_sahihi:error_rate:5m > 0.01
            for: 10m
            labels:
              severity: page
              team: afya-sahihi
            annotations:
              summary: "Error rate on {{ $labels.service }} exceeds 1%"
              description: |
                Service {{ $labels.service }} has returned 5xx for
                {{ $value | humanizePercentage }} of requests over the
                last 10 minutes. Threshold: 1%. Clinical impact: a
                fraction of clinician queries are currently refused.
              runbook_url: https://github.com/AmosBunde/Afya-Sahihi/blob/main/docs/observability/RUNBOOKS/high-error-rate.md

          - alert: LatencyP99High
            expr: afya_sahihi:latency_p99:5m{service="gateway"} > 6
            for: 10m
            labels:
              severity: page
              team: afya-sahihi
            annotations:
              summary: "Gateway P99 latency > 6s for 10m"
              description: |
                Gateway P99 latency is {{ $value | humanizeDuration }};
                conformal auto-rollback threshold is 6s. Clinician wait
                time is the top UX metric — page if sustained.
              runbook_url: https://github.com/AmosBunde/Afya-Sahihi/blob/main/docs/observability/RUNBOOKS/latency-p99-high.md

          - alert: ConformalCoverageBelowTarget
            expr: |
              avg_over_time(afya_sahihi_conformal_coverage[1h]) < 0.87
            for: 1h
            labels:
              severity: warning
              team: afya-sahihi
            annotations:
              summary: "Conformal coverage < 0.87 for 1h"
              description: |
                Marginal coverage averaged {{ $value | humanizePercentage }}
                over the last hour; target is 0.90, alert threshold is
                0.87. Either the calibration set has drifted or q_hat
                needs refresh. Check drift_mmd dashboard.
              runbook_url: https://github.com/AmosBunde/Afya-Sahihi/blob/main/docs/observability/RUNBOOKS/conformal-coverage-low.md

          - alert: PostgresConnectionsNearLimit
            expr: |
              pg_stat_activity_count{datname="afya-sahihi"} /
              on() pg_settings_max_connections > 0.85
            for: 15m
            labels:
              severity: warning
              team: afya-sahihi
            annotations:
              summary: "Postgres connections > 85% of max for 15m"
              description: |
                Active connections are {{ $value | humanizePercentage }}
                of Postgres max_connections. Connection leak or pool
                misconfiguration suspected.
              runbook_url: https://github.com/AmosBunde/Afya-Sahihi/blob/main/docs/observability/RUNBOOKS/postgres-connections-high.md

          - alert: GpuMemoryPressure
            expr: |
              (DCGM_FI_DEV_FB_USED / (DCGM_FI_DEV_FB_USED + DCGM_FI_DEV_FB_FREE))
                > 0.92
            for: 10m
            labels:
              severity: warning
              team: afya-sahihi
            annotations:
              summary: "GPU memory > 92% on {{ $labels.Hostname }}"
              description: |
                vLLM will OOM soon. Reduce max_num_seqs or restart to
                reclaim paged attention memory.
              runbook_url: https://github.com/AmosBunde/Afya-Sahihi/blob/main/docs/observability/RUNBOOKS/gpu-memory-pressure.md
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: prometheus
  namespace: observability
  labels:
    app.kubernetes.io/name: prometheus
    app.kubernetes.io/part-of: afya-sahihi
spec:
  serviceName: prometheus
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: prometheus
  template:
    metadata:
      labels:
        app.kubernetes.io/name: prometheus
    spec:
      serviceAccountName: prometheus
      securityContext:
        runAsNonRoot: true
        runAsUser: 65534
        runAsGroup: 65534
        fsGroup: 65534
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: prometheus
          image: prom/prometheus:v2.55.0
          imagePullPolicy: IfNotPresent
          args:
            - --config.file=/etc/prometheus/prometheus.yml
            - --storage.tsdb.path=/prometheus
            - --storage.tsdb.retention.time=30d
            - --storage.tsdb.retention.size=45GB
            - --web.enable-lifecycle
            - --web.enable-remote-write-receiver
            - --enable-feature=exemplar-storage
          env:
            - name: DEPLOYMENT_ENV
              value: production
          ports:
            - name: http
              containerPort: 9090
          resources:
            requests:
              cpu: "200m"
              memory: 1Gi
            limits:
              cpu: "2"
              memory: 4Gi
          readinessProbe:
            httpGet:
              path: /-/ready
              port: 9090
            initialDelaySeconds: 15
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /-/healthy
              port: 9090
            initialDelaySeconds: 60
            periodSeconds: 30
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          volumeMounts:
            - name: config
              mountPath: /etc/prometheus/prometheus.yml
              subPath: prometheus.yml
            - name: rules
              mountPath: /etc/prometheus/rules
            - name: data
              mountPath: /prometheus
      volumes:
        - name: config
          configMap:
            name: prometheus-config
        - name: rules
          configMap:
            name: prometheus-rules
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 50Gi
---
apiVersion: v1
kind: Service
metadata:
  name: prometheus
  namespace: observability
  labels:
    app.kubernetes.io/name: prometheus
    app.kubernetes.io/part-of: afya-sahihi
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: prometheus
  ports:
    - name: http
      port: 9090
      targetPort: http
