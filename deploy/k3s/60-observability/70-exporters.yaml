# Metric exporters: node, postgres, redis, nginx-Traefik.
# DCGM is out-of-cluster on the GPU node (scraped via static config in
# 40-prometheus.yaml), so it's not here.

apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: node-exporter
  namespace: observability
  labels:
    app.kubernetes.io/name: node-exporter
    app.kubernetes.io/part-of: afya-sahihi
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: node-exporter
  template:
    metadata:
      labels:
        app.kubernetes.io/name: node-exporter
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9100"
    spec:
      hostPID: true
      hostNetwork: true
      tolerations:
        - operator: Exists
          effect: NoSchedule
      securityContext:
        runAsNonRoot: true
        runAsUser: 65534
        runAsGroup: 65534
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: node-exporter
          image: prom/node-exporter:v1.8.2
          imagePullPolicy: IfNotPresent
          args:
            - --path.rootfs=/host
            - --path.procfs=/host/proc
            - --path.sysfs=/host/sys
            - --collector.filesystem.mount-points-exclude=^/(dev|proc|sys|var/lib/docker/.+)($|/)
            - --no-collector.wifi
          ports:
            - name: metrics
              containerPort: 9100
              hostPort: 9100
          resources:
            requests:
              cpu: "50m"
              memory: 64Mi
            limits:
              cpu: "200m"
              memory: 256Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          volumeMounts:
            - name: rootfs
              mountPath: /host
              readOnly: true
              mountPropagation: HostToContainer
      volumes:
        - name: rootfs
          hostPath:
            path: /
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres-exporter
  namespace: observability
  labels:
    app.kubernetes.io/name: postgres-exporter
    app.kubernetes.io/part-of: afya-sahihi
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: postgres-exporter
  template:
    metadata:
      labels:
        app.kubernetes.io/name: postgres-exporter
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9187"
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 65534
        runAsGroup: 65534
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: postgres-exporter
          image: prometheuscommunity/postgres-exporter:v0.15.0
          imagePullPolicy: IfNotPresent
          env:
            - name: DATA_SOURCE_NAME
              valueFrom:
                secretKeyRef:
                  name: afya-sahihi-postgres-exporter
                  key: dsn
            - name: PG_EXPORTER_AUTO_DISCOVER_DATABASES
              value: "false"
            - name: PG_EXPORTER_EXCLUDE_DATABASES
              value: "template0,template1"
          ports:
            - name: metrics
              containerPort: 9187
          resources:
            requests:
              cpu: "20m"
              memory: 64Mi
            limits:
              cpu: "200m"
              memory: 256Mi
          readinessProbe:
            httpGet:
              path: /
              port: 9187
            initialDelaySeconds: 5
            periodSeconds: 10
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis-exporter
  namespace: observability
  labels:
    app.kubernetes.io/name: redis-exporter
    app.kubernetes.io/part-of: afya-sahihi
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: redis-exporter
  template:
    metadata:
      labels:
        app.kubernetes.io/name: redis-exporter
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9121"
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 65534
        runAsGroup: 65534
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: redis-exporter
          image: oliver006/redis_exporter:v1.64.1
          imagePullPolicy: IfNotPresent
          env:
            - name: REDIS_ADDR
              value: redis://afya-sahihi-redis.afya-sahihi.svc.cluster.local:6379
          ports:
            - name: metrics
              containerPort: 9121
          resources:
            requests:
              cpu: "20m"
              memory: 64Mi
            limits:
              cpu: "200m"
              memory: 256Mi
          readinessProbe:
            httpGet:
              path: /
              port: 9121
            initialDelaySeconds: 5
            periodSeconds: 10
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
