# OTel Collector as a DaemonSet.
#
# Every node runs one Collector; workload pods export via the
# host-local Collector (OTLP gRPC on 4317 / HTTP on 4318) so a single
# Tempo outage does not backpressure the request path. The Collector
# runs the Batch processor + a memory_limiter before fanning out to
# Tempo (traces), Prometheus remote-write (span metrics), Loki (logs),
# and Phoenix (LLM spans). Prometheus and Loki wiring lands with
# issue #32; Phoenix with #31 — stubbed here so the pipeline shape is
# correct end-to-end.

apiVersion: v1
kind: ServiceAccount
metadata:
  name: otel-collector
  namespace: observability
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: otel-collector
rules:
  # k8sattributes processor needs read on pods/namespaces/nodes to
  # enrich spans with kubernetes metadata. No write permissions.
  - apiGroups: [""]
    resources: ["pods", "namespaces", "nodes"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["apps"]
    resources: ["replicasets"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: otel-collector
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: otel-collector
subjects:
  - kind: ServiceAccount
    name: otel-collector
    namespace: observability
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: otel-collector-config
  namespace: observability
data:
  collector.yaml: |
    receivers:
      otlp:
        protocols:
          grpc:
            endpoint: 0.0.0.0:4317
            max_recv_msg_size_mib: 16
          http:
            endpoint: 0.0.0.0:4318

    processors:
      # Reject spans older than 5 minutes — stale spans bloat the queue
      # and almost always indicate a clock-skew or replay issue we want
      # to notice, not silently ingest.
      memory_limiter:
        check_interval: 2s
        limit_mib: 800
        spike_limit_mib: 200
      batch:
        send_batch_size: 512
        timeout: 5s
        send_batch_max_size: 1024
      # Strip keys that either SHOULD not have been set (application
      # bug) or that an instrumentor might set in a way that leaks PHI.
      # Application code MUST NOT emit these; this is defence in depth.
      attributes:
        actions:
          - key: afya_sahihi.query.text
            action: delete
          - key: http.request.body
            action: delete
          # db.statement is dropped while we audit every asyncpg path;
          # most instrumentors keep it parameterised (values not bound),
          # but we've had bugs where a raw execute() with f-string SQL
          # slipped through. Re-enable once scripts/hooks/no-fstring-sql
          # covers the full repo.
          - key: db.statement
            action: delete
      k8sattributes:
        auth_type: serviceAccount
        passthrough: false
        extract:
          metadata:
            - k8s.namespace.name
            - k8s.pod.name
            - k8s.node.name
            - k8s.deployment.name
        pod_association:
          - sources:
              - from: resource_attribute
                name: k8s.pod.ip
          - sources:
              - from: connection
      # Route LLM spans (openinference.span.kind=LLM) to Phoenix only;
      # everything else goes to Tempo only. Phoenix's UI becomes
      # unusable if it ingests every gateway/retrieval/conformal span,
      # and Tempo's service-graph loses fidelity when LLM token events
      # bloat its trace storage. The filter processor drops spans the
      # downstream pipeline should not see.
      filter/llm_only:
        traces:
          span:
            # Keep only spans that declared themselves LLM spans.
            - attributes["openinference.span.kind"] != "LLM"
      filter/non_llm_only:
        traces:
          span:
            - attributes["openinference.span.kind"] == "LLM"
      # Phoenix-side attribute scrubber. Defence in depth: even though
      # the LLM span emitter in labeling.rubric and backend.observability.
      # llm_spans must not set these, strip them here so a regression in
      # application code cannot leak PHI into Phoenix.
      attributes/phoenix:
        actions:
          - key: afya_sahihi.query.text
            action: delete
          - key: http.request.body
            action: delete

    exporters:
      otlp/tempo:
        endpoint: tempo.observability.svc.cluster.local:4317
        tls:
          insecure: true
        sending_queue:
          enabled: true
          queue_size: 5000
        retry_on_failure:
          enabled: true
          initial_interval: 5s
          max_interval: 30s
          max_elapsed_time: 300s
      # Span metrics (latency, error rate) go to Prometheus via
      # remote-write. Prometheus ships with #32, enabling this pipeline.
      prometheusremotewrite:
        endpoint: http://prometheus.observability.svc.cluster.local:9090/api/v1/write
        tls:
          insecure: true
        sending_queue:
          enabled: true
          queue_size: 5000
        retry_on_failure:
          enabled: true
          initial_interval: 5s
          max_interval: 30s
          max_elapsed_time: 300s
        # resource_to_telemetry_conversion was deprecated in Collector
        # 0.100; default behavior plus k8sattributes processor gives
        # us the same labels on exported metrics.
      # LLM-specific spans (openinference.span.kind=LLM) fan to
      # Phoenix. The filter/non_llm_only processor drops everything
      # else before this exporter is reached.
      otlp/phoenix:
        endpoint: phoenix.observability.svc.cluster.local:6007
        tls:
          insecure: true
        sending_queue:
          enabled: true
          queue_size: 2000
        retry_on_failure:
          enabled: true
          initial_interval: 5s
          max_interval: 30s
          max_elapsed_time: 300s

    service:
      telemetry:
        logs:
          level: info
        metrics:
          address: 0.0.0.0:8888
      pipelines:
        # Tempo trace pipeline: everything EXCEPT LLM spans (which
        # would bloat Tempo's storage with per-token events). The
        # filter/non_llm_only processor DROPS spans where
        # openinference.span.kind == "LLM" so what remains is non-LLM.
        traces/tempo:
          receivers: [otlp]
          processors:
            - memory_limiter
            - k8sattributes
            - attributes
            - filter/non_llm_only
            - batch
          exporters: [otlp/tempo]
        # Phoenix pipeline: ONLY LLM spans. filter/llm_only DROPS
        # spans where openinference.span.kind != "LLM" so what remains
        # is LLM spans. No attribute scrubber — Phoenix needs
        # output.value + token events for calibration review.
        traces/phoenix:
          receivers: [otlp]
          processors:
            - memory_limiter
            - k8sattributes
            - filter/llm_only
            - attributes/phoenix
            - batch
          exporters: [otlp/phoenix]
        # Span-derived metrics to Prometheus via remote-write. Enabled
        # by #32. The memory_limiter + batch is sufficient; no k8s
        # attribute enrichment because Prometheus already has the
        # kube_pod_* series from kube-state-metrics for join time.
        metrics:
          receivers: [otlp]
          processors: [memory_limiter, batch]
          exporters: [prometheusremotewrite]
---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: otel-collector
  namespace: observability
  labels:
    app.kubernetes.io/name: otel-collector
    app.kubernetes.io/part-of: afya-sahihi
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: otel-collector
  updateStrategy:
    type: RollingUpdate
  template:
    metadata:
      labels:
        app.kubernetes.io/name: otel-collector
    spec:
      serviceAccountName: otel-collector
      hostNetwork: false
      tolerations:
        - operator: Exists
          effect: NoSchedule
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        runAsGroup: 10001
        fsGroup: 10001
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: otel-collector
          image: otel/opentelemetry-collector-contrib:0.100.0
          imagePullPolicy: IfNotPresent
          args:
            - --config=/etc/otel/collector.yaml
          env:
            - name: K8S_NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
            - name: K8S_POD_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.podIP
            - name: GOMEMLIMIT
              value: "900MiB"
          ports:
            - name: otlp-grpc
              containerPort: 4317
              hostPort: 4317
              protocol: TCP
            - name: otlp-http
              containerPort: 4318
              hostPort: 4318
              protocol: TCP
            - name: metrics
              containerPort: 8888
              protocol: TCP
          resources:
            requests:
              cpu: "100m"
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 1Gi
          readinessProbe:
            httpGet:
              path: /
              port: 13133
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: 13133
            initialDelaySeconds: 30
            periodSeconds: 30
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          volumeMounts:
            - name: config
              mountPath: /etc/otel
      volumes:
        - name: config
          configMap:
            name: otel-collector-config
---
apiVersion: v1
kind: Service
metadata:
  name: otel-collector
  namespace: observability
  labels:
    app.kubernetes.io/name: otel-collector
    app.kubernetes.io/part-of: afya-sahihi
spec:
  type: ClusterIP
  # internalTrafficPolicy: Local pins client traffic to the Collector
  # pod on the client's own node, preserving the per-node backpressure
  # isolation that the DaemonSet topology is designed for. Falls back
  # to cluster-wide routing if the local pod is unhealthy.
  internalTrafficPolicy: Local
  selector:
    app.kubernetes.io/name: otel-collector
  ports:
    - name: otlp-grpc
      port: 4317
      targetPort: otlp-grpc
      protocol: TCP
    - name: otlp-http
      port: 4318
      targetPort: otlp-http
      protocol: TCP
