# Alertmanager: routes severity=page to PagerDuty, severity=warning
# to Slack, drops the rest. Two receivers' auth comes from the
# SealedSecret `afya-sahihi-alertmanager-keys` (pagerduty_key, slack_webhook).

apiVersion: v1
kind: ServiceAccount
metadata:
  name: alertmanager
  namespace: observability
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: alertmanager-config
  namespace: observability
data:
  alertmanager.yml: |
    global:
      resolve_timeout: 5m

    route:
      receiver: slack-warnings
      group_by: [alertname, service]
      group_wait: 30s
      group_interval: 5m
      repeat_interval: 12h
      routes:
        - matchers: [severity="page"]
          receiver: pagerduty
          continue: true
        - matchers: [severity="warning"]
          receiver: slack-warnings

    receivers:
      - name: pagerduty
        pagerduty_configs:
          - routing_key_file: /etc/alertmanager/secrets/pagerduty_key
            severity: '{{ .CommonLabels.severity }}'
            description: '{{ .CommonAnnotations.summary }}'
            details:
              runbook: '{{ .CommonAnnotations.runbook_url }}'
              cluster: afya-sahihi
              firing: '{{ .Alerts.Firing | len }}'
      - name: slack-warnings
        slack_configs:
          - api_url_file: /etc/alertmanager/secrets/slack_webhook
            channel: '#afya-sahihi-alerts'
            send_resolved: true
            title: '{{ .CommonAnnotations.summary }}'
            text: |
              {{ range .Alerts }}
              *Severity:* {{ .Labels.severity }}
              *Service:* {{ .Labels.service }}
              *Description:* {{ .Annotations.description }}
              *Runbook:* {{ .Annotations.runbook_url }}
              {{ end }}

    inhibit_rules:
      # A `page` alert on the same service inhibits `warning` alerts —
      # avoids spamming Slack when PagerDuty already woke someone.
      - source_matchers: [severity="page"]
        target_matchers: [severity="warning"]
        equal: [service, alertname]
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: alertmanager
  namespace: observability
  labels:
    app.kubernetes.io/name: alertmanager
    app.kubernetes.io/part-of: afya-sahihi
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: alertmanager
  template:
    metadata:
      labels:
        app.kubernetes.io/name: alertmanager
    spec:
      serviceAccountName: alertmanager
      securityContext:
        runAsNonRoot: true
        runAsUser: 65534
        runAsGroup: 65534
        fsGroup: 65534
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: alertmanager
          image: prom/alertmanager:v0.27.0
          imagePullPolicy: IfNotPresent
          args:
            - --config.file=/etc/alertmanager/alertmanager.yml
            - --storage.path=/alertmanager
            - --web.listen-address=:9093
          ports:
            - name: http
              containerPort: 9093
          resources:
            requests:
              cpu: "50m"
              memory: 128Mi
            limits:
              cpu: "500m"
              memory: 512Mi
          readinessProbe:
            httpGet:
              path: /-/ready
              port: 9093
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /-/healthy
              port: 9093
            initialDelaySeconds: 30
            periodSeconds: 30
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          volumeMounts:
            - name: config
              mountPath: /etc/alertmanager/alertmanager.yml
              subPath: alertmanager.yml
            - name: secrets
              mountPath: /etc/alertmanager/secrets
              readOnly: true
            - name: data
              mountPath: /alertmanager
      volumes:
        - name: config
          configMap:
            name: alertmanager-config
        - name: secrets
          secret:
            secretName: afya-sahihi-alertmanager-keys  # pragma: allowlist secret
            defaultMode: 0400
        - name: data
          emptyDir:
            sizeLimit: 1Gi
---
apiVersion: v1
kind: Service
metadata:
  name: alertmanager
  namespace: observability
  labels:
    app.kubernetes.io/name: alertmanager
    app.kubernetes.io/part-of: afya-sahihi
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: alertmanager
  ports:
    - name: http
      port: 9093
      targetPort: http
