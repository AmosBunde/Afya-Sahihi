# Retrieval service — hybrid dense + BM25 + RRF fusion + cross-encoder
# rerank. Internal-only: only the gateway calls it. No IngressRoute.
#
# Stamped from 10-gateway.yaml with service-specific env and a
# narrower NetworkPolicy (ingress from gateway only).

apiVersion: v1
kind: ConfigMap
metadata:
  name: retrieval-config
  namespace: afya-sahihi
  labels:
    app.kubernetes.io/name: retrieval
    app.kubernetes.io/part-of: afya-sahihi
data:
  SERVICE_NAME: afya-sahihi-retrieval
  SERVICE_PORT: "8081"
  SERVICE_WORKERS: "2"
  SERVICE_LOG_LEVEL: info
  SERVICE_LOG_FORMAT: json
  CORPUS_VERSION: v1.0
  OTEL_SERVICE_NAME: afya-sahihi-retrieval
  OTEL_SERVICE_NAMESPACE: afya-sahihi
  OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector.observability.svc.cluster.local:4317
  OTEL_EXPORTER_OTLP_PROTOCOL: grpc
  OTEL_TRACES_SAMPLER_RATIO: "1.0"
  DEPLOYMENT_ENV: dev
  # Retrieval tuning (ADR-0002)
  RETRIEVAL_TOP_K: "6"
  RETRIEVAL_CANDIDATES: "40"
  RETRIEVAL_RRF_K: "60"
  RETRIEVAL_DENSE_WEIGHT: "0.6"
  RETRIEVAL_SPARSE_WEIGHT: "0.4"
  RETRIEVAL_RERANK_MODEL: BAAI/bge-reranker-v2-m3
  RETRIEVAL_RERANK_TOP_K: "6"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: retrieval
  namespace: afya-sahihi
  labels:
    app.kubernetes.io/name: retrieval
    app.kubernetes.io/part-of: afya-sahihi
    app.kubernetes.io/component: rag
spec:
  replicas: 2
  revisionHistoryLimit: 5
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app.kubernetes.io/name: retrieval
  template:
    metadata:
      labels:
        app.kubernetes.io/name: retrieval
        app.kubernetes.io/part-of: afya-sahihi
        app.kubernetes.io/component: rag
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9090"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: retrieval
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app.kubernetes.io/name: retrieval
      containers:
        - name: retrieval
          image: harbor.aku.edu/afya-sahihi/retrieval:1.0.0
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8081
              protocol: TCP
            - name: metrics
              containerPort: 9090
              protocol: TCP
          envFrom:
            - configMapRef:
                name: retrieval-config
            - secretRef:
                name: retrieval-secrets
          resources:
            requests:
              cpu: "1"
              memory: "2Gi"
            limits:
              cpu: "4"
              memory: "8Gi"  # cross-encoder reranker holds model weights
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 2
          startupProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 15
            periodSeconds: 5
            failureThreshold: 60  # 5 min for model load
          lifecycle:
            preStop:
              exec:
                command: ["/bin/sh", "-c", "sleep 10"]
          volumeMounts:
            - name: tmp
              mountPath: /tmp
            - name: model-cache
              mountPath: /app/.cache
      volumes:
        - name: tmp
          emptyDir:
            sizeLimit: 256Mi
        - name: model-cache
          emptyDir:
            sizeLimit: 4Gi
      terminationGracePeriodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: retrieval
  namespace: afya-sahihi
  labels:
    app.kubernetes.io/name: retrieval
    app.kubernetes.io/part-of: afya-sahihi
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: retrieval
  ports:
    - name: http
      port: 8081
      targetPort: http
      protocol: TCP
    - name: metrics
      port: 9090
      targetPort: metrics
      protocol: TCP
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: retrieval
  namespace: afya-sahihi
automountServiceAccountToken: false
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: retrieval
  namespace: afya-sahihi
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: retrieval
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: retrieval
  namespace: afya-sahihi
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: retrieval
  minReplicas: 2
  maxReplicas: 6
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Percent
          value: 50
          periodSeconds: 60
    scaleUp:
      stabilizationWindowSeconds: 30
      policies:
        - type: Percent
          value: 100
          periodSeconds: 30
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: retrieval
  namespace: afya-sahihi
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: retrieval
  policyTypes: [Ingress, Egress]
  ingress:
    # Only the gateway may call retrieval on :8081.
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: gateway
      ports:
        - port: 8081
          protocol: TCP
    # Prometheus scrapes :9090.
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: observability
      ports:
        - port: 9090
          protocol: TCP
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
      ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
    # Postgres for hybrid search + MinIO for chunk blobs (if any).
    - to:
        - ipBlock:
            cidr: 10.0.0.10/32
      ports:
        - port: 5432
          protocol: TCP
        - port: 9000
          protocol: TCP
    # OTel collector for spans.
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: observability
          podSelector:
            matchLabels:
              app.kubernetes.io/name: otel-collector
      ports:
        - port: 4317
          protocol: TCP
---
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: retrieval
  namespace: afya-sahihi
  labels:
    app.kubernetes.io/name: retrieval
    app.kubernetes.io/part-of: afya-sahihi
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: retrieval
  endpoints:
    - port: metrics
      interval: 15s
      path: /metrics
