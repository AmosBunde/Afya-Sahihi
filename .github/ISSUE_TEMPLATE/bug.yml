---
name: Bug
description: Report a defect or unexpected behavior
title: "[bug] "
labels: ["type/bug"]
body:
  - type: markdown
    attributes:
      value: |
        If this bug involves PHI or a security vulnerability, do NOT file here.
        Email `security@aku.edu` instead. See `SECURITY.md`.

  - type: textarea
    id: summary
    attributes:
      label: Summary
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      value: |
        1.
        2.
        3.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true

  - type: input
    id: query-id
    attributes:
      label: Query ID (if applicable)
      description: The `query_id` from the response. This lets us pull traces.

  - type: textarea
    id: context
    attributes:
      label: Environment & version
      value: |
        - Afya Sahihi version:
        - Browser / client:
        - Facility / role:

  - type: dropdown
    id: severity
    attributes:
      label: Severity
      options:
        - "sev0 (clinical harm or data loss possible)"
        - "sev1 (major feature broken)"
        - "sev2 (workaround exists)"
        - "sev3 (cosmetic / minor)"
    validations:
      required: true
