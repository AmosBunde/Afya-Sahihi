---
name: ci

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write
  security-events: write

jobs:
  hygiene:
    name: Hygiene & hooks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install pre-commit
        run: pip install pre-commit
      - name: Run pre-commit on all files
        run: pre-commit run --all-files --show-diff-on-failure

  secrets:
    name: Gitleaks secret scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}

  sast:
    name: SAST (Semgrep + Bandit + CodeQL)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Semgrep
        uses: semgrep/semgrep-action@v1
        with:
          config: >-
            p/ci
            p/security-audit
            p/owasp-top-ten
            p/python
            p/fastapi
            p/secrets
      - name: Bandit
        run: |
          pip install 'bandit[toml]'
          bandit -c pyproject.toml -r backend/ -f sarif -o bandit.sarif || true
      - uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: bandit.sarif
      - name: CodeQL init
        uses: github/codeql-action/init@v3
        with:
          languages: python, javascript
      - name: CodeQL analyze
        uses: github/codeql-action/analyze@v3

  deps:
    name: Dependency audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: pip-audit
        run: |
          pip install pip-audit
          pip-audit --strict -r backend/requirements.txt
      - name: npm audit
        run: |
          cd frontend
          npm ci --omit=dev
          npm audit --audit-level=high --omit=dev

  backend-tests:
    name: Backend unit + integration
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_PASSWORD: test
          POSTGRES_DB: afya_sahihi_test
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready --health-interval 10s --health-timeout 5s --health-retries 5
      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
    env:
      PG_HOST: localhost
      PG_PORT: "5432"
      PG_USER: postgres
      PG_PASSWORD: test
      PG_DATABASE: afya_sahihi_test
      REDIS_HOST: localhost
      HAKIKA_ENV: test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: astral-sh/setup-uv@v4
      - name: Install deps
        run: |
          cd backend
          uv sync --all-extras
      - name: Run migrations
        run: |
          cd backend
          uv run alembic upgrade head
      - name: Unit tests
        run: |
          cd backend
          uv run pytest tests/unit -v --cov=app --cov-report=xml
      - name: Integration tests
        run: |
          cd backend
          uv run pytest tests/integration -v
      - uses: codecov/codecov-action@v4
        with:
          files: backend/coverage.xml

  tier1-evals:
    name: Tier 1 evals (Inspect AI)
    runs-on: ubuntu-latest
    needs: backend-tests
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: astral-sh/setup-uv@v4
      - name: Run Tier 1 evals
        env:
          INSPECT_MODEL_URL: ${{ secrets.INSPECT_MODEL_URL }}
          INSPECT_MODEL_TOKEN: ${{ secrets.INSPECT_MODEL_TOKEN }}
        run: |
          cd eval
          uv sync
          uv run inspect eval tier1/golden_set.py --model afya-sahihi --log-level warning
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: tier1-logs
          path: eval/logs/

  frontend-tests:
    name: Frontend lint + typecheck + tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: cd frontend && npm ci
      - run: cd frontend && npm run lint
      - run: cd frontend && npm run typecheck
      - run: cd frontend && npm test -- --run

  container-build:
    name: Container build + vulnerability scan
    runs-on: ubuntu-latest
    needs: [hygiene, backend-tests, frontend-tests]
    if: github.event_name == 'push'
    strategy:
      matrix:
        service: [gateway, retrieval, conformal, audit, frontend]
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.service == 'frontend' && 'frontend/Dockerfile' || 'backend/Dockerfile' }}
          push: false
          load: true
          tags: afya-sahihi/${{ matrix.service }}:ci
          build-args: |
            SERVICE=${{ matrix.service }}
      - name: Trivy vuln scan
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: afya-sahihi/${{ matrix.service }}:ci
          format: sarif
          output: trivy-${{ matrix.service }}.sarif
          severity: CRITICAL,HIGH
          exit-code: "1"
      - uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-${{ matrix.service }}.sarif
          category: trivy-${{ matrix.service }}

  manifest-validate:
    name: Validate k3s manifests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: kubeconform
        run: |
          curl -sL https://github.com/yannh/kubeconform/releases/latest/download/kubeconform-linux-amd64.tar.gz | tar xz
          ./kubeconform -strict -schema-location default -schema-location \
            'https://raw.githubusercontent.com/datreeio/CRDs-catalog/main/{{ .Group }}/{{ .ResourceKind | lower }}_{{ .ResourceAPIVersion }}.json' \
            deploy/k3s/
      - name: Kyverno policy check
        uses: kyverno/action-install-cli@v0.2.0
      - run: |
          if [ -d deploy/k3s/policies ]; then
            kyverno apply deploy/k3s/policies/ --resource deploy/k3s/*.yaml
          fi
