---
name: ci

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write
  security-events: write

jobs:
  # Preflight detects which repo layout artefacts exist in this ref. The
  # rest of the workflow uses its outputs to skip cleanly when a component
  # has not landed yet (backend/pyproject.toml, frontend/package-lock.json,
  # eval/tier1/golden_set.py, per-service Dockerfiles). job-level `if:`
  # cannot call hashFiles() directly — GitHub only exposes that function
  # in step-level expressions — hence this detection job.
  preflight:
    name: Preflight — detect repo layout
    runs-on: ubuntu-latest
    outputs:
      has_backend: ${{ steps.detect.outputs.has_backend }}
      has_frontend: ${{ steps.detect.outputs.has_frontend }}
      has_eval: ${{ steps.detect.outputs.has_eval }}
      has_backend_dockerfile: ${{ steps.detect.outputs.has_backend_dockerfile }}
      has_frontend_dockerfile: ${{ steps.detect.outputs.has_frontend_dockerfile }}
    steps:
      - uses: actions/checkout@v6
      - id: detect
        run: |
          emit() { echo "$1=$2" >> "$GITHUB_OUTPUT"; }
          emit has_backend              "$([ -f backend/pyproject.toml ]       && echo true || echo false)"
          emit has_frontend             "$([ -f frontend/package-lock.json ]   && echo true || echo false)"
          emit has_eval                 "$([ -f eval/tier1/golden_set.py ]     && echo true || echo false)"
          emit has_backend_dockerfile   "$([ -f backend/Dockerfile ]           && echo true || echo false)"
          emit has_frontend_dockerfile  "$([ -f frontend/Dockerfile ]          && echo true || echo false)"

  hygiene:
    name: Hygiene & hooks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: tools/requirements-dev.txt
      - name: Install pinned dev toolchain
        run: pip install -r tools/requirements-dev.txt
      - name: Run pre-commit on all files
        run: pre-commit run --all-files --show-diff-on-failure
      - name: Run custom hook unit tests
        run: bash scripts/hooks/tests/run_all.sh

  secrets:
    name: Gitleaks secret scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}

  sast:
    name: SAST (Semgrep + Bandit + CodeQL)
    runs-on: ubuntu-latest
    needs: preflight
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Semgrep
        uses: semgrep/semgrep-action@v1
        with:
          config: >-
            p/ci
            p/security-audit
            p/owasp-top-ten
            p/python
            p/fastapi
            p/secrets
      - name: Bandit
        # Only run when there is Python backend code to scan; otherwise bandit
        # has nothing to configure itself from (pyproject.toml) and the SARIF
        # upload below fails on a missing file.
        if: hashFiles('backend/pyproject.toml') != ''
        run: |
          pip install 'bandit[toml]'
          bandit -c backend/pyproject.toml -r backend/ -f sarif -o bandit.sarif || true
      - name: Upload Bandit SARIF
        if: hashFiles('bandit.sarif') != ''
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: bandit.sarif
          category: bandit
      # CodeQL needs at least one source file per listed language. Pass
      # each language only when its source tree actually exists — otherwise
      # finalize exits 32 with "no source code seen." Build the list
      # dynamically from the preflight outputs.
      - name: Determine CodeQL languages
        id: codeql_langs
        if: needs.preflight.outputs.has_backend == 'true' || needs.preflight.outputs.has_frontend == 'true'
        run: |
          langs=""
          if [ "${{ needs.preflight.outputs.has_backend }}" = "true" ]; then
            langs="python"
          fi
          if [ "${{ needs.preflight.outputs.has_frontend }}" = "true" ]; then
            langs="${langs:+$langs, }javascript"
          fi
          echo "langs=$langs" >> "$GITHUB_OUTPUT"
      - name: CodeQL init
        if: steps.codeql_langs.outputs.langs != ''
        uses: github/codeql-action/init@v4
        with:
          languages: ${{ steps.codeql_langs.outputs.langs }}
      - name: CodeQL analyze
        if: steps.codeql_langs.outputs.langs != ''
        uses: github/codeql-action/analyze@v4

  deps:
    name: Dependency audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: pip-audit
        # Skip until the backend dep manifest exists (it ships with issue #11
        # and the backend scaffold). A hard failure on a missing file gives
        # every PR today a red check with no actionable signal.
        if: hashFiles('backend/requirements.txt') != '' || hashFiles('backend/pyproject.toml') != ''
        run: |
          pip install pip-audit
          if [ -f backend/requirements.txt ]; then
            pip-audit --strict -r backend/requirements.txt
          else
            # pip-audit auto-detects pyproject.toml when given a project path.
            # Starlette CVEs (CVE-2025-54121, CVE-2025-62727) are in a
            # transitive dep pinned by FastAPI; no FastAPI release bundles
            # starlette >= 0.49.1 yet. Suppress until upstream catches up.
            # Tracked: remove these ignores when FastAPI ships with fixed
            # starlette. Re-audit monthly via ci-dependabot runbook.
            pip-audit --strict backend \
              --ignore-vuln CVE-2025-54121 \
              --ignore-vuln CVE-2025-62727
          fi
      - name: npm audit
        if: hashFiles('frontend/package-lock.json') != ''
        run: |
          cd frontend
          npm ci --omit=dev
          npm audit --audit-level=high --omit=dev

  backend-tests:
    name: Backend unit + integration
    runs-on: ubuntu-latest
    # No-op until the backend scaffold lands. GitHub Actions does not expose
    # hashFiles() in job-level `if:`, so we pull the flag from the preflight
    # job's outputs instead.
    needs: preflight
    if: needs.preflight.outputs.has_backend == 'true'
    services:
      # ParadeDB image bundles pgvector + pg_search against Postgres 16,
      # which the initial schema migration requires (ADR-0002, issue #11).
      # pgvector/pgvector:pg16 does NOT ship pg_search.
      postgres:
        image: paradedb/paradedb:latest-pg16
        env:
          POSTGRES_PASSWORD: test
          POSTGRES_DB: afya_sahihi_test
          POSTGRES_USER: postgres
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready --health-interval 10s --health-timeout 5s --health-retries 5
      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
    env:
      PG_HOST: localhost
      PG_PORT: "5432"
      PG_USER: postgres
      PG_PASSWORD: test
      PG_DATABASE: afya_sahihi_test
      REDIS_HOST: localhost
      HAKIKA_ENV: test
      # Alembic reads this one DSN; see backend/alembic/env.py.
      AFYA_SAHIHI_DATABASE_URL: postgresql+psycopg://postgres:test@localhost:5432/afya_sahihi_test
      # Integration tests reuse the same DSN via the testcontainers fallback.
      AFYA_SAHIHI_TEST_DATABASE_URL: postgresql+psycopg://postgres:test@localhost:5432/afya_sahihi_test
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - uses: astral-sh/setup-uv@v7
      - name: Install deps
        run: |
          cd backend
          uv sync --all-extras
      - name: Run migrations
        run: |
          cd backend
          uv run alembic upgrade head
      - name: Unit tests
        # Unit test directory lands with later issues; skip gracefully.
        if: hashFiles('backend/tests/unit/**') != ''
        run: |
          cd backend
          uv run pytest tests/unit -v --cov=app --cov-report=xml
      - name: Integration tests
        if: hashFiles('backend/tests/integration/**') != ''
        run: |
          cd backend
          uv run pytest tests/integration -v -m integration
      - uses: codecov/codecov-action@v6
        if: hashFiles('backend/coverage.xml') != ''
        with:
          files: backend/coverage.xml

  tier1-evals:
    name: Tier 1 evals (Inspect AI)
    runs-on: ubuntu-latest
    needs: [preflight, backend-tests]
    # Run only when the full stack is deployable (Dockerfiles + eval
    # task both present). The task requires a live model endpoint;
    # without the gateway container built and reachable, the
    # `--model afya-sahihi` provider is unresolvable. Pre-deployment
    # coverage is the pure-Python scorer tests in the backend-tests
    # job (16 tests).
    if: >-
      needs.preflight.outputs.has_eval == 'true'
      && needs.preflight.outputs.has_backend_dockerfile == 'true'
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - uses: astral-sh/setup-uv@v7
      - name: Run Tier 1 evals
        env:
          INSPECT_MODEL_URL: ${{ secrets.INSPECT_MODEL_URL }}
          INSPECT_MODEL_TOKEN: ${{ secrets.INSPECT_MODEL_TOKEN }}
        run: |
          cd eval
          uv sync
          uv run inspect eval tier1/golden_set.py --model afya-sahihi --log-level warning
      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: tier1-logs
          path: eval/logs/

  frontend-tests:
    name: Frontend lint + typecheck + tests
    runs-on: ubuntu-latest
    # Skipped until the React UI lands (issue #35).
    needs: preflight
    if: needs.preflight.outputs.has_frontend == 'true'
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: cd frontend && npm ci
      - run: cd frontend && npm run lint
      - run: cd frontend && npm run typecheck
      - run: cd frontend && npm test -- --run

  container-build:
    name: Container build + vulnerability scan
    runs-on: ubuntu-latest
    needs: [preflight, hygiene, backend-tests, frontend-tests]
    # Only run on push (post-merge) AND only once at least one Dockerfile exists.
    if: >-
      github.event_name == 'push'
      && (needs.preflight.outputs.has_backend_dockerfile == 'true'
          || needs.preflight.outputs.has_frontend_dockerfile == 'true')
    strategy:
      matrix:
        service: [gateway, retrieval, conformal, audit, frontend]
    steps:
      - uses: actions/checkout@v6
      - uses: docker/setup-buildx-action@v4
      - name: Build
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ${{ matrix.service == 'frontend' && 'frontend/Dockerfile' || 'backend/Dockerfile' }}
          push: false
          load: true
          tags: afya-sahihi/${{ matrix.service }}:ci
          build-args: |
            SERVICE=${{ matrix.service }}
      - name: Trivy vuln scan
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: afya-sahihi/${{ matrix.service }}:ci
          format: sarif
          output: trivy-${{ matrix.service }}.sarif
          severity: CRITICAL,HIGH
          exit-code: "1"
      - uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: trivy-${{ matrix.service }}.sarif
          category: trivy-${{ matrix.service }}

  manifest-validate:
    name: Validate k3s manifests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: kubeconform
        # Pin the kubeconform version. The default templating engine does
        # not expose a `lower` filter across all released versions; rather
        # than fight the schema-location template, rely on `default` for
        # core Kubernetes kinds and `-ignore-missing-schemas` so non-core
        # CRDs (ServiceMonitor, IngressRoute) are skipped instead of
        # failing the build. Once the Prometheus Operator and Traefik
        # CRDs are vendored with the cluster (issue #34), we can add
        # explicit schema locations pointing at those vendored schemas.
        run: |
          KUBECONFORM_VERSION=v0.6.7
          curl -sL "https://github.com/yannh/kubeconform/releases/download/${KUBECONFORM_VERSION}/kubeconform-linux-amd64.tar.gz" | tar xz
          ./kubeconform -strict -schema-location default -ignore-missing-schemas deploy/k3s/
      - name: Kyverno policy check
        uses: kyverno/action-install-cli@v0.2.0
      - run: |
          if [ -d deploy/k3s/policies ]; then
            kyverno apply deploy/k3s/policies/ --resource deploy/k3s/*.yaml
          fi
