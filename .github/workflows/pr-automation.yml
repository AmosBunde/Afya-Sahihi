---
name: pr-automation

on:
  pull_request:
    types: [opened, edited, synchronize, ready_for_review]

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  label:
    name: Auto-label by paths
    runs-on: ubuntu-latest
    steps:
      - uses: actions/labeler@v5
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          configuration-path: .github/labeler.yml
          sync-labels: true

  size:
    name: PR size check
    runs-on: ubuntu-latest
    steps:
      - uses: codelytv/pr-size-labeler@v1
        with:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          xs_label: 'size/xs'
          xs_max_size: 10
          s_label: 'size/s'
          s_max_size: 100
          m_label: 'size/m'
          m_max_size: 500
          l_label: 'size/l'
          l_max_size: 1000
          xl_label: 'size/xl'
          fail_if_xl: 'true'
          message_if_xl: >
            This PR exceeds 1,000 lines changed. Afya Sahihi caps PRs at 1,000
            lines to keep review effective. Please split into smaller PRs,
            each focused on a single concern.

  checklist:
    name: PR checklist filled out
    runs-on: ubuntu-latest
    steps:
      - uses: mheap/require-checklist-action@v2
        with:
          requireChecklist: true

  lint-pr-title:
    name: Lint PR title (conventional)
    runs-on: ubuntu-latest
    steps:
      - uses: amannn/action-semantic-pull-request@v5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          types: |
            feat
            fix
            docs
            style
            refactor
            perf
            test
            build
            ci
            chore
            revert
            security
          requireScope: false
          subjectPattern: ^(?![A-Z]).+$
          subjectPatternError: |
            The subject of the PR title "{subject}" must start with a lowercase letter.

  request-reviewers:
    name: Auto-request CODEOWNERS
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/github-script@v7
        with:
          script: |
            // Draft PRs do not auto-request review
            if (context.payload.pull_request.draft) return;
            // CODEOWNERS handles this natively, this is a fallback notice.
            const body = `Thanks for opening this PR. A few reminders before merge:\n\n` +
              `- Read the reviewer checklist in the PR template above\n` +
              `- Make sure all Tier 1 evals pass (CI is gating)\n` +
              `- If this touches the request path, link the relevant ADR\n` +
              `- If you skipped pre-commit with \`--no-verify\`, please rerun locally before requesting review`;
            github.rest.issues.createComment({
              ...context.repo,
              issue_number: context.payload.pull_request.number,
              body,
            });
        if: github.event.action == 'opened'
