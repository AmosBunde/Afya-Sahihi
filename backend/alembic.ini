# Alembic configuration for Afya Sahihi.
# See https://alembic.sqlalchemy.org/en/latest/tutorial.html for the reference.

[alembic]
script_location = alembic

# The connection URL is injected by alembic/env.py from the Settings
# object; this placeholder is only consulted when alembic is run without
# env.py (which we never do). Left intentionally broken so a missing
# env.py path is obvious.
sqlalchemy.url = DO_NOT_USE_THIS_URL_SET_IN_ENV_PY

file_template = %%(year)d%%(month).2d%%(day).2d_%%(rev)s_%%(slug)s
truncate_slug_length = 40
timezone = UTC

# Fail loudly on import-time errors rather than silently skipping the
# broken migration.
revision_environment = false

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(asctime)s %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %Y-%m-%dT%H:%M:%S%z
